<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Backend Learning Lab</title>
<style>
:root{--bg:#0f172a;--panel:#111c33;--card:#18233c;--text:#e5e7eb;--muted:#9ca3af;--accent:#38bdf8;--good:#22c55e;--warn:#f59e0b;--bad:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827);color:var(--text)}.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}.sidebar{background:rgba(15,23,42,.95);border-right:1px solid rgba(255,255,255,.08);padding:22px;position:sticky;top:0;height:100vh;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}.logo{width:46px;height:46px;border-radius:14px;background:var(--accent);color:#082f49;display:grid;place-items:center;font-weight:900}.brand h1{font-size:20px;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:13px}.nav button{width:100%;text-align:left;background:transparent;color:var(--text);border:1px solid rgba(255,255,255,.08);padding:12px;border-radius:12px;margin:6px 0;cursor:pointer}.nav button.active,.nav button:hover{border-color:var(--accent);background:rgba(56,189,248,.12)}main{padding:28px;max-width:1100px}.hero{display:grid;grid-template-columns:1fr 260px;gap:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:26px}.eyebrow{color:var(--accent);text-transform:uppercase;letter-spacing:.12em;font-size:12px;font-weight:800}.hero h2{font-size:38px;margin:8px 0}.hero p{color:var(--muted);line-height:1.6}.progressCard{background:var(--panel);border-radius:18px;padding:20px}.progressCard span{font-size:44px;font-weight:900}.bar{height:12px;background:#0b1220;border-radius:20px;overflow:hidden}.bar div{height:100%;background:var(--good);width:0%}.toolbar{display:flex;gap:12px;margin:20px 0}.toolbar input,.toolbar select{background:#0b1220;color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px;width:100%}.module{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;margin:16px 0;padding:22px}.module h3{margin:0 0 8px;font-size:26px}.tag{display:inline-block;color:#082f49;background:var(--accent);font-size:12px;font-weight:800;border-radius:99px;padding:4px 9px;margin-right:6px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-top:16px}.card{background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:15px}.card h4{margin:0 0 8px}.check{display:flex;gap:8px;align-items:flex-start;margin:8px 0;color:var(--muted)}.check input{margin-top:4px}.project{border-left:4px solid var(--accent)}button.primary,button.ghost{border:0;border-radius:12px;padding:11px 14px;cursor:pointer;font-weight:800}.primary{background:var(--accent);color:#082f49}.ghost{background:#0b1220;color:var(--text);border:1px solid rgba(255,255,255,.1)!important;margin-top:10px}dialog{border:0;border-radius:20px;background:#0f172a;color:var(--text);max-width:560px;width:92%;padding:0}dialog::backdrop{background:rgba(0,0,0,.6)}.quizBox{padding:24px}.answer{display:block;width:100%;margin:8px 0;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:#111c33;color:var(--text);cursor:pointer;text-align:left}.answer.correct{border-color:var(--good)}.answer.wrong{border-color:var(--bad)}.feedback{min-height:24px;font-weight:800}.close{float:right;background:transparent;color:var(--text);border:0;font-size:24px;cursor:pointer}.hidden{display:none}@media(max-width:800px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.hero{grid-template-columns:1fr}.hero h2{font-size:30px}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar"><div class="brand"><div class="logo">BE</div><div><h1>Backend Learning Lab</h1><p>Backend-first full-stack path</p></div></div><div id="nav" class="nav"></div><button id="reset" class="ghost">Reset progress</button></aside>
<main><section class="hero"><div><p class="eyebrow">Interactive curriculum</p><h2>Learn backend development from zero to job-ready.</h2><p>Work through lessons, quiz yourself, build real projects, and track your progress in this browser.</p></div><div class="progressCard"><span id="pct">0%</span><p>overall progress</p><div class="bar"><div id="bar"></div></div></div></section><section class="toolbar"><input id="search" placeholder="Search topics, lessons, projects..."/><select id="level"><option value="all">All levels</option><option value="foundation">Foundation</option><option value="core">Core backend</option><option value="advanced">Advanced</option><option value="career">Career-ready</option></select></section><section id="content"></section></main>
</div>
<dialog id="quiz"><form method="dialog" class="quizBox"><button class="close" value="cancel">×</button><h3 id="qtitle"></h3><p id="qtext"></p><div id="answers"></div><p id="feedback" class="feedback"></p><button id="next" type="button" class="primary">Next question</button></form></dialog>
<script>
const modules=[
{id:'internet',level:'foundation',title:'1. Internet & Web Foundations',why:'Understand how browsers, servers, DNS, HTTP, and APIs work together.',lessons:['Client vs server','DNS and domains','HTTP methods and status codes','JSON and request/response lifecycle','Use curl/Postman to inspect APIs'],project:'Build a request explorer: enter a URL, choose GET/POST, inspect the response.',quiz:[['What does DNS do?',['Stores passwords','Turns domain names into IP addresses','Runs JavaScript'],1],['Which status means not found?',['200','404','500'],1]]},
{id:'programming',level:'foundation',title:'2. Programming for Backend',why:'Learn one backend language deeply before adding frameworks.',lessons:['Variables, functions, loops','Data structures: arrays, maps, sets','Error handling','File I/O','Testing basics'],project:'Create a command-line task tracker with save/load from a file.',quiz:[['Why write tests?',['To prove code can never fail','To catch regressions and document behavior','To make code slower'],1],['A map/dictionary stores data as...',['key/value pairs','only numbers','CSS rules'],0]]},
{id:'node',level:'core',title:'3. Node.js / Express APIs',why:'Build real backend endpoints and learn routing, middleware, validation, and errors.',lessons:['Create an Express server','Routes and controllers','Middleware','Input validation','Global error handling'],project:'Build a REST API for jobs, tasks, or plumbing appointments.',quiz:[['What is middleware?',['Code that runs during request handling','A database table','A frontend component'],0],['REST APIs usually expose...',['Endpoints/resources','Only images','Operating systems'],0]]},
{id:'db',level:'core',title:'4. Databases',why:'Most backend systems are built around storing, querying, and protecting data.',lessons:['SQL tables, rows, columns','Primary and foreign keys','CRUD queries','Indexes','Transactions','Intro to MongoDB/document databases'],project:'Design a database for users, work orders, invoices, and payments.',quiz:[['A foreign key is used to...',['Link tables','Encrypt passwords','Style pages'],0],['Indexes usually help with...',['Faster reads','Making CSS better','Deleting the server'],0]]},
{id:'auth',level:'core',title:'5. Authentication & Security',why:'Learn how to protect users and applications.',lessons:['Password hashing','Sessions vs JWT','Authorization roles','CORS','Rate limiting','OWASP basics'],project:'Add login, signup, and admin-only routes to your API.',quiz:[['Passwords should be stored as...',['Plain text','Hashed values','Screenshots'],1],['Authorization answers...',['Who are you?','What are you allowed to do?','What color is the button?'],1]]},
{id:'architecture',level:'advanced',title:'6. Backend Architecture',why:'Move from small apps to systems that are maintainable and scalable.',lessons:['Layered architecture','Service boundaries','Queues and background jobs','Caching','Logging and monitoring','API documentation'],project:'Add email/job queue processing and API docs to your project.',quiz:[['Caching is mainly used to...',['Reduce repeated expensive work','Replace all databases','Write HTML'],0],['Logs help you...',['Debug production behavior','Choose fonts'],0]]},
{id:'devops',level:'advanced',title:'7. Deployment & DevOps',why:'A backend engineer must ship and operate applications.',lessons:['Environment variables','Docker basics','CI/CD','Deploy to Render/Fly/Railway/AWS','Database migrations','Backups'],project:'Containerize your API and deploy it with a managed database.',quiz:[['Environment variables are useful for...',['Secrets/config outside code','Drawing icons','Typing faster'],0],['CI/CD helps automate...',['Testing and deployment','Password guessing','DNS theft'],0]]},
{id:'fullstack',level:'career',title:'8. Full-Stack Bridge & Career',why:'Connect your backend to frontend skills and prepare for jobs.',lessons:['Frontend consumes APIs','React basics','API contracts','Portfolio README','Resume bullets','Interview practice'],project:'Build a complete app: frontend + backend + database + auth + deployment.',quiz:[['A portfolio project should show...',['A real deployed app with code and explanation','Only screenshots','No README'],0],['Full-stack engineers connect...',['Frontend, backend, data, deployment','Only printers','Only CSS'],0]]}
];
let state=JSON.parse(localStorage.getItem('backendLab')||'{}'),active='internet',quizIndex=0,currentQuiz=[];
const $=id=>document.getElementById(id);function save(){localStorage.setItem('backendLab',JSON.stringify(state));updateProgress()}
function key(mid,i){return mid+'-'+i}function total(){return modules.reduce((a,m)=>a+m.lessons.length,0)}function done(){return modules.reduce((a,m)=>a+m.lessons.filter((_,i)=>state[key(m.id,i)]).length,0)}
function updateProgress(){const p=Math.round(done()/total()*100);$('pct').textContent=p+'%';$('bar').style.width=p+'%'}
function renderNav(){ $('nav').innerHTML=modules.map(m=>`<button class="${m.id===active?'active':''}" onclick="active='${m.id}';render()">${m.title}</button>`).join('') }
function render(){renderNav();const s=$('search').value.toLowerCase(),lvl=$('level').value;let list=modules.filter(m=>(lvl==='all'||m.level===lvl)&&(`${m.title} ${m.why} ${m.lessons.join(' ')} ${m.project}`.toLowerCase().includes(s))); if(!list.find(m=>m.id===active)&&list[0]) active=list[0].id; $('content').innerHTML=list.map(m=>`<article class="module"><span class="tag">${m.level}</span><h3>${m.title}</h3><p>${m.why}</p><div class="grid"><div class="card"><h4>Lessons</h4>${m.lessons.map((l,i)=>`<label class="check"><input type="checkbox" ${state[key(m.id,i)]?'checked':''} onchange="state['${key(m.id,i)}']=this.checked;save()"> <span>${l}</span></label>`).join('')}</div><div class="card project"><h4>Build this</h4><p>${m.project}</p><button class="primary" onclick="startQuiz('${m.id}')">Take quiz</button></div><div class="card"><h4>How to study</h4><p>Read/watch one concept, code it immediately, write notes in your own words, then improve your project.</p></div></div></article>`).join('')||'<p>No matching modules.</p>';updateProgress()}
function startQuiz(id){const m=modules.find(x=>x.id===id);currentQuiz=m.quiz;quizIndex=0;$('qtitle').textContent=m.title+' quiz';showQ();$('quiz').showModal()}
function showQ(){const q=currentQuiz[quizIndex];$('qtext').textContent=q[0];$('feedback').textContent='';$('answers').innerHTML=q[1].map((a,i)=>`<button type="button" class="answer" onclick="answer(${i})">${a}</button>`).join('')}
function answer(i){const q=currentQuiz[quizIndex],buttons=[...document.querySelectorAll('.answer')];buttons.forEach((b,idx)=>{b.disabled=true;if(idx===q[2])b.classList.add('correct');if(idx===i&&idx!==q[2])b.classList.add('wrong')});$('feedback').textContent=i===q[2]?'Correct.':'Not quite. Review the lesson and try again.'}
$('next').onclick=()=>{quizIndex=(quizIndex+1)%currentQuiz.length;showQ()};$('search').oninput=render;$('level').onchange=render;$('reset').onclick=()=>{state={};save();render()};render();
</script>
</body>
</html>
